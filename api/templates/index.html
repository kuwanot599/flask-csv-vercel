<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ユーザーデータ同期システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <div class="max-w-4xl mx-auto px-4 py-12">
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-gray-900 tracking-tight">ユーザーマスター管理</h1>
                <p class="text-sm text-gray-500 mt-1">GitHubのCSVデータからSupabaseへ自動同期された最新のレコードです。</p>
            </div>
            <span class="inline-flex items-center gap-1.5 py-1.5 px-3 rounded-full text-xs font-medium bg-green-100 text-green-800">
                <span class="w-2 h-2 inline-block bg-green-500 rounded-full animate-pulse"></span>
                Supabase Connected
            </span>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50 border-b border-gray-200 text-xs font-semibold text-gray-600 uppercase tracking-wider">
                        <th class="px-6 py-4">ID</th>
                        <th class="px-6 py-4">氏名 (Name)</th>
                        <th class="px-6 py-4">役職 / ロール (Role)</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100 text-sm text-gray-700">
                    {% for user in users %}
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 font-mono font-medium text-gray-500">{{ user.id }}</td>
                        <td class="px-6 py-4 font-semibold text-gray-900">{{ user.name }}</td>
                        <td class="px-6 py-4">
                            <span class="inline-block px-2.5 py-1 text-xs font-medium rounded-md bg-blue-50 text-blue-700 border border-blue-100">
                                {{ user.role }}
                            </span>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        
        <p class="text-center text-xs text-gray-400 mt-6">データ更新を行うには、ローカルの data.csv を書き換えて GitHub へ push してください。</p>
    </div>

</body>
</html>
